<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Editor - ppt-agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-bar button:hover { background: #555; }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }
    .nav-bar button:disabled:hover { background: #333; }

    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
    }

    .nav-spacer { flex: 1; }
    .brand {
      color: #555;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .slide-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-width: 0;
      overflow: hidden;
      background: #111;
    }

    .slide-wrapper {
      position: relative;
      width: 960px;
      height: 540px;
      transform-origin: center center;
    }

    .slide-wrapper iframe {
      width: 960px;
      height: 540px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #fff;
      display: block;
      position: relative;
      z-index: 1;
    }

    .selection-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      border-radius: 4px;
    }

    .selection-layer.active {
      pointer-events: auto;
      cursor: crosshair;
    }

    .selection-box {
      position: absolute;
      border: 2px solid #ef4444;
      background: rgba(239, 68, 68, 0.15);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      z-index: 11;
    }

    .feedback-panel {
      width: 420px;
      min-width: 340px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .panel-section {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-section + .panel-section {
      border-top: 1px solid #333;
    }

    .panel-label {
      color: #aaa;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .feedback-textarea {
      width: 100%;
      height: 120px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    .feedback-textarea:focus { border-color: #666; }
    .feedback-textarea::placeholder { color: #555; }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      white-space: nowrap;
    }

    .btn:hover { background: #555; }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn:disabled:hover { background: #333; }

    .btn-region {
      background: #0f766e;
      flex: 1;
    }

    .btn-region:hover { background: #0d9488; }

    .btn-clear {
      background: #444;
      min-width: 88px;
    }

    .btn-codex {
      background: #2563eb;
      width: 100%;
    }

    .btn-codex:hover { background: #3b82f6; }

    .selection-meta {
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
      min-height: 58px;
    }

    .xpath-list {
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 140px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.5;
      color: #bbb;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .xpath-item {
      border-left: 2px solid #444;
      padding-left: 8px;
    }

    .xpath-item .path {
      color: #e5e7eb;
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .xpath-item .text {
      color: #9ca3af;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-section {
      flex: 1;
      min-height: 0;
    }

    .log-view {
      flex: 1;
      min-height: 0;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #d1d5db;
      font-size: 12px;
      line-height: 1.45;
      padding: 10px;
      overflow: auto;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      white-space: pre-wrap;
    }

    .status-bar {
      height: 28px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      gap: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #555;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .status-message {
      flex: 1;
      text-align: right;
      color: #666;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner.visible { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="nav-bar">
      <div class="nav-controls">
        <button id="btn-prev" title="Previous slide (Left arrow)">&#9664; Prev</button>
        <span class="slide-counter" id="slide-counter">-- / --</span>
        <button id="btn-next" title="Next slide (Right arrow)">Next &#9654;</button>
      </div>
      <div class="nav-spacer"></div>
      <span class="brand">ppt-agent</span>
    </div>

    <div class="main-content">
      <div class="slide-panel" id="slide-panel">
        <div class="slide-wrapper" id="slide-wrapper">
          <iframe id="slide-iframe" sandbox="allow-same-origin allow-scripts" loading="eager"></iframe>
          <div class="selection-layer" id="selection-layer"></div>
          <div class="selection-box" id="selection-box" style="display:none"></div>
        </div>
      </div>

      <div class="feedback-panel">
        <div class="panel-section">
          <div class="panel-label">Edit Request</div>
          <textarea
            class="feedback-textarea"
            id="feedback-textarea"
            placeholder="Describe the change you want in the selected region..."
          ></textarea>
          <div class="button-row">
            <button class="btn btn-region" id="btn-select-region">Select Region</button>
            <button class="btn btn-clear" id="btn-clear-region" disabled>Clear</button>
          </div>
          <button class="btn btn-codex" id="btn-apply" disabled>
            <span class="spinner" id="spinner-apply"></span>
            <span id="btn-apply-text">Send To Codex</span>
          </button>
        </div>

        <div class="panel-section">
          <div class="panel-label">Selected Region</div>
          <div class="selection-meta" id="selection-meta">No region selected.</div>
          <div class="panel-label">Detected XPath Targets</div>
          <div class="xpath-list" id="xpath-list">No targets yet.</div>
        </div>

        <div class="panel-section log-section">
          <div class="panel-label">Codex Work Log (stdout/stderr)</div>
          <div class="log-view" id="log-view"></div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <span>
        <span class="status-dot" id="status-dot"></span>
        <span id="status-connection">Connecting...</span>
      </span>
      <span class="status-message" id="status-message"></span>
    </div>
  </div>

  <script>
    let slides = [];
    let currentIndex = 0;
    let isApplying = false;
    let isSelecting = false;
    let dragStart = null;
    let selection = null;
    let targets = [];
    let currentRunId = null;

    const SLIDE_W = 960;
    const SLIDE_H = 540;

    const $ = (sel) => document.querySelector(sel);
    const btnPrev = $('#btn-prev');
    const btnNext = $('#btn-next');
    const slideCounter = $('#slide-counter');
    const slideIframe = $('#slide-iframe');
    const slidePanel = $('#slide-panel');
    const slideWrapper = $('#slide-wrapper');
    const selectionLayer = $('#selection-layer');
    const selectionBox = $('#selection-box');

    const textarea = $('#feedback-textarea');
    const btnSelectRegion = $('#btn-select-region');
    const btnClearRegion = $('#btn-clear-region');
    const btnApply = $('#btn-apply');
    const btnApplyText = $('#btn-apply-text');
    const spinnerApply = $('#spinner-apply');

    const selectionMeta = $('#selection-meta');
    const xpathList = $('#xpath-list');
    const logView = $('#log-view');

    const statusDot = $('#status-dot');
    const statusConn = $('#status-connection');
    const statusMsg = $('#status-message');

    function setStatus(message) {
      statusMsg.textContent = message;
    }

    function appendLog(text) {
      if (!text) return;
      logView.textContent += text;
      logView.scrollTop = logView.scrollHeight;
    }

    function clearLog() {
      logView.textContent = '';
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function resetSelection() {
      selection = null;
      targets = [];
      dragStart = null;
      selectionBox.style.display = 'none';
      btnClearRegion.disabled = true;
      renderSelectionMeta();
      renderTargets();
      updateApplyState();
    }

    function renderSelectionMeta() {
      if (!selection) {
        selectionMeta.textContent = 'No region selected.';
        return;
      }

      selectionMeta.textContent = `x=${selection.x}, y=${selection.y}, width=${selection.width}, height=${selection.height}`;
    }

    function renderTargets() {
      if (!targets.length) {
        xpathList.textContent = selection ? 'No intersecting elements found.' : 'No targets yet.';
        return;
      }

      xpathList.innerHTML = targets.map((target, idx) => {
        const safePath = escapeHtml(target.xpath || '');
        const safeText = escapeHtml(target.text || '(no text)');
        const safeTag = escapeHtml(target.tag || 'unknown');
        return [
          '<div class="xpath-item">',
          `<div><strong>${idx + 1}. ${safeTag}</strong></div>`,
          `<div class="path">${safePath}</div>`,
          `<div class="text">${safeText}</div>`,
          '</div>'
        ].join('');
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function updateApplyState() {
      const prompt = textarea.value.trim();
      btnApply.disabled = isApplying || !prompt || !selection;
      btnSelectRegion.disabled = isApplying;
      btnClearRegion.disabled = isApplying || !selection;
    }

    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      currentIndex = index;
      slideIframe.src = `/slides/${slides[currentIndex]}`;
      slideCounter.textContent = `${currentIndex + 1} / ${slides.length}`;
      btnPrev.disabled = currentIndex === 0;
      btnNext.disabled = currentIndex === slides.length - 1;
      resetSelection();
      setStatus(`Loaded ${slides[currentIndex]}`);
    }

    function scaleSlide() {
      const padX = 48;
      const padY = 48;
      const availW = slidePanel.clientWidth - padX;
      const availH = slidePanel.clientHeight - padY;
      if (availW <= 0 || availH <= 0) return;

      const scale = Math.min(availW / SLIDE_W, availH / SLIDE_H) * 0.95;
      slideWrapper.style.transform = `scale(${scale})`;
    }

    function getXPath(el) {
      if (!el || el.nodeType !== Node.ELEMENT_NODE) return '';

      const segments = [];
      let node = el;
      while (node && node.nodeType === Node.ELEMENT_NODE) {
        const tag = node.tagName.toLowerCase();

        let index = 1;
        let sibling = node.previousElementSibling;
        while (sibling) {
          if (sibling.tagName === node.tagName) index += 1;
          sibling = sibling.previousElementSibling;
        }

        segments.unshift(`${tag}[${index}]`);
        node = node.parentElement;
      }

      return `/${segments.join('/')}`;
    }

    function intersectArea(a, b) {
      const left = Math.max(a.x, b.x);
      const top = Math.max(a.y, b.y);
      const right = Math.min(a.x + a.width, b.x + b.width);
      const bottom = Math.min(a.y + a.height, b.y + b.height);
      if (right <= left || bottom <= top) return 0;
      return (right - left) * (bottom - top);
    }

    function extractTargetsForSelection(sel) {
      const doc = slideIframe.contentDocument;
      if (!doc || !doc.body) return [];

      const all = Array.from(doc.body.querySelectorAll('*'));
      const candidates = [];

      for (const el of all) {
        const tag = el.tagName ? el.tagName.toLowerCase() : '';
        if (!tag || ['script', 'style', 'link', 'meta', 'noscript'].includes(tag)) continue;

        const rect = el.getBoundingClientRect();
        if (!rect || rect.width <= 1 || rect.height <= 1) continue;

        const box = {
          x: rect.left,
          y: rect.top,
          width: rect.width,
          height: rect.height,
        };

        const area = intersectArea(sel, box);
        if (area <= 0) continue;

        const xpath = getXPath(el);
        if (!xpath) continue;

        const text = (el.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 140);

        candidates.push({
          xpath,
          tag,
          text,
          area,
        });
      }

      candidates.sort((a, b) => b.area - a.area);

      const dedup = [];
      const seen = new Set();
      for (const item of candidates) {
        if (seen.has(item.xpath)) continue;
        seen.add(item.xpath);
        dedup.push({ xpath: item.xpath, tag: item.tag, text: item.text });
        if (dedup.length >= 12) break;
      }

      return dedup;
    }

    function updateSelectionBox(sel) {
      if (!sel) {
        selectionBox.style.display = 'none';
        return;
      }

      selectionBox.style.display = 'block';
      selectionBox.style.left = `${sel.x}px`;
      selectionBox.style.top = `${sel.y}px`;
      selectionBox.style.width = `${sel.width}px`;
      selectionBox.style.height = `${sel.height}px`;
    }

    function clientToSlidePoint(clientX, clientY) {
      const rect = selectionLayer.getBoundingClientRect();
      const relX = clamp((clientX - rect.left) / rect.width, 0, 1);
      const relY = clamp((clientY - rect.top) / rect.height, 0, 1);

      return {
        x: Math.round(relX * SLIDE_W),
        y: Math.round(relY * SLIDE_H),
      };
    }

    function enterSelectionMode() {
      if (isApplying) return;
      isSelecting = true;
      dragStart = null;
      selectionLayer.classList.add('active');
      setStatus('Drag on the slide to select the edit region.');
    }

    function exitSelectionMode() {
      isSelecting = false;
      dragStart = null;
      selectionLayer.classList.remove('active');
    }

    function onSelectStart(ev) {
      if (!isSelecting) return;
      ev.preventDefault();
      dragStart = clientToSlidePoint(ev.clientX, ev.clientY);
      updateSelectionBox({ x: dragStart.x, y: dragStart.y, width: 1, height: 1 });
    }

    function onSelectMove(ev) {
      if (!isSelecting || !dragStart) return;

      const point = clientToSlidePoint(ev.clientX, ev.clientY);
      const x = Math.min(dragStart.x, point.x);
      const y = Math.min(dragStart.y, point.y);
      const width = Math.max(1, Math.abs(point.x - dragStart.x));
      const height = Math.max(1, Math.abs(point.y - dragStart.y));

      updateSelectionBox({ x, y, width, height });
    }

    function onSelectEnd(ev) {
      if (!isSelecting || !dragStart) return;

      const point = clientToSlidePoint(ev.clientX, ev.clientY);
      const x = Math.min(dragStart.x, point.x);
      const y = Math.min(dragStart.y, point.y);
      const width = Math.max(1, Math.abs(point.x - dragStart.x));
      const height = Math.max(1, Math.abs(point.y - dragStart.y));

      exitSelectionMode();

      if (width < 3 || height < 3) {
        resetSelection();
        setStatus('Selection is too small. Select a larger region.');
        return;
      }

      selection = { x, y, width, height };
      targets = extractTargetsForSelection(selection);

      updateSelectionBox(selection);
      renderSelectionMeta();
      renderTargets();
      updateApplyState();

      setStatus(`Region selected (${targets.length} XPath target(s) detected).`);
    }

    async function applyChanges() {
      if (isApplying || !selection) return;
      const prompt = textarea.value.trim();
      if (!prompt) return;

      isApplying = true;
      btnApplyText.textContent = 'Running Codex...';
      spinnerApply.classList.add('visible');
      updateApplyState();

      clearLog();
      appendLog(`[editor] submitting ${slides[currentIndex]}\n`);
      setStatus('Submitting edit request to Codex...');

      try {
        const res = await fetch('/api/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slide: slides[currentIndex],
            prompt,
            selection,
            targets,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || `Server error ${res.status}`);
        }

        currentRunId = data.runId || currentRunId;
        setStatus(data.message || 'Codex request completed.');
      } catch (err) {
        setStatus(`Error: ${err.message}`);
        appendLog(`\n[editor] request failed: ${err.message}\n`);
      } finally {
        isApplying = false;
        btnApplyText.textContent = 'Send To Codex';
        spinnerApply.classList.remove('visible');
        updateApplyState();
      }
    }

    function connectSSE() {
      const evtSource = new EventSource('/api/events');

      evtSource.onopen = () => {
        statusDot.classList.add('connected');
        statusDot.classList.remove('disconnected');
        statusConn.textContent = 'Connected';
      };

      evtSource.addEventListener('fileChanged', (e) => {
        try {
          const { file } = JSON.parse(e.data);
          if (file === slides[currentIndex]) {
            slideIframe.src = slideIframe.src;
            setStatus(`Slide ${file} updated.`);
          }
        } catch (err) {
          console.error('SSE parse error:', err);
        }
      });

      evtSource.addEventListener('applyStarted', (e) => {
        try {
          const data = JSON.parse(e.data);
          currentRunId = data.runId;
          appendLog(`[codex] run ${data.runId} started for ${data.slide}\n`);
        } catch (err) {
          console.error('SSE applyStarted parse error:', err);
        }
      });

      evtSource.addEventListener('applyLog', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (currentRunId && data.runId !== currentRunId) return;
          appendLog(data.chunk || '');
        } catch (err) {
          console.error('SSE applyLog parse error:', err);
        }
      });

      evtSource.addEventListener('applyFinished', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (currentRunId && data.runId !== currentRunId) return;
          appendLog(`\n[codex] finished (code=${data.code}) ${data.message || ''}\n`);
          setStatus(data.message || 'Codex run finished.');
        } catch (err) {
          console.error('SSE applyFinished parse error:', err);
        }
      });

      evtSource.onerror = () => {
        statusDot.classList.remove('connected');
        statusDot.classList.add('disconnected');
        statusConn.textContent = 'Disconnected';
      };
    }

    btnPrev.addEventListener('click', () => goToSlide(currentIndex - 1));
    btnNext.addEventListener('click', () => goToSlide(currentIndex + 1));
    btnSelectRegion.addEventListener('click', enterSelectionMode);
    btnClearRegion.addEventListener('click', () => {
      resetSelection();
      setStatus('Selection cleared.');
    });

    selectionLayer.addEventListener('mousedown', onSelectStart);
    window.addEventListener('mousemove', onSelectMove);
    window.addEventListener('mouseup', onSelectEnd);

    btnApply.addEventListener('click', applyChanges);
    textarea.addEventListener('input', updateApplyState);

    document.addEventListener('keydown', (e) => {
      const inTextarea = document.activeElement === textarea;

      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        applyChanges();
        return;
      }

      if (e.key === 'Escape' && isSelecting) {
        exitSelectionMode();
        setStatus('Selection canceled.');
        return;
      }

      if (inTextarea) return;

      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        goToSlide(currentIndex - 1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        goToSlide(currentIndex + 1);
      }
    });

    window.addEventListener('resize', scaleSlide);
    slideIframe.addEventListener('load', () => {
      setStatus(`Loaded ${slides[currentIndex]}`);
    });

    async function init() {
      setStatus('Loading slide list...');

      try {
        const res = await fetch('/api/slides');
        if (!res.ok) {
          throw new Error(`Failed to fetch slide list: ${res.status}`);
        }

        slides = await res.json();

        if (slides.length === 0) {
          setStatus('No slides found.');
          slideCounter.textContent = '0 / 0';
          return;
        }

        goToSlide(0);
        scaleSlide();
        renderSelectionMeta();
        renderTargets();
        updateApplyState();
        setStatus('Ready. Select a region and describe the edit.');
      } catch (err) {
        setStatus(`Error loading slides: ${err.message}`);
        console.error('Init error:', err);
      }

      connectSSE();
    }

    init();
  </script>
</body>
</html>
